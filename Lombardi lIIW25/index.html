<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aeroporto Inteligente - Sistema de Voo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="painel-voo">
        <h1>Painel de Controle de Voo</h1>
        
        <!-- Área de exibição dos dados -->
        <div id="cartao-voo">
            <p><strong>Código:</strong> <span id="txt-codigo">---</span></p>
            <p><strong>Origem:</strong> <span id="txt-origem">---</span></p>
            <p><strong>Destino:</strong> <span id="txt-destino">---</span></p>
            <p><strong>Altitude:</strong> <span id="txt-altitude">0</span> ft</p>
            <p><strong>Status:</strong> <span id="txt-status">Aguardando</span></p>
        </div>

        <!-- Imagem do Avião -->
        <div class="cenario">
            <img id="aviao" src="airplane-mode-on.jpg" alt="Avião">
        </div>

        <!-- Botões de Ação -->
        <div class="controles">
            <button onclick="meuVoo.decolar()">Decolar</button>
            <button onclick="meuVoo.decolar()">Aumentar Altitude</button>
            <button onclick="meuVoo.pousar()">Pousar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
